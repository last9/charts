name: chart-release

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/workflows/chart-release.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Update chart dependencies
        run: |
          for chart in charts/*/; do
            helm dependency update "$chart"
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to OCI (ghcr.io)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ORG: ${{ github.repository_owner }}
        run: |
          echo "$GHCR_TOKEN" | helm registry login ghcr.io -u "$GHCR_USER" --password-stdin
          mkdir -p .cr-release-packages
          for chart in charts/*/; do
            helm package "$chart" -d .cr-release-packages
          done
          for pkg in .cr-release-packages/*.tgz; do
            helm push "$pkg" "oci://ghcr.io/${GHCR_ORG}/charts" || true
          done
