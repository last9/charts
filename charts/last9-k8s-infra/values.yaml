# Last9 global config — single knob for credentials + cluster identity.
last9:
  # OTLP HTTP endpoint (e.g. https://otlp.last9.io)
  otlpEndpoint: ""
  # Auth header value (e.g. "Basic <base64>"). Used verbatim as Authorization header.
  # Mutually exclusive with last9.existingSecret.
  writeToken: ""
  # Pre-existing secret with key `authorization` holding the full header value.
  existingSecret: ""
  # Cluster identity — added as `k8s.cluster.name` resource attribute.
  cluster:
    name: ""
  # Deployment environment — added as `deployment.environment` resource attribute.
  environment: "production"

# ─── Agent: upstream opentelemetry-collector subchart. DaemonSet. ───
# Logs (filelog), host metrics, kubelet metrics, k8sattributes, OTLP receiver for app signals.
agent:
  enabled: true
  mode: daemonset
  fullnameOverride: last9-agent
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.150.1"
  presets:
    logsCollection:
      enabled: true
      includeCollectorLogs: false
      storeCheckpoints: true
    hostMetrics:
      enabled: true
    kubeletMetrics:
      enabled: true
    # kubernetesAttributes preset disabled — upstream still injects deprecated
    # "k8sattributes" alias. We add "k8s_attributes" manually in config below.
    kubernetesAttributes:
      enabled: false
  ports:
    otlp:
      enabled: true
    otlp-http:
      enabled: true
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
  extraEnvs:
    - name: LAST9_AUTH
      valueFrom:
        secretKeyRef:
          name: last9-k8s-infra-otlp-auth
          key: authorization
    - name: LAST9_OTLP_ENDPOINT
      valueFrom:
        configMapKeyRef:
          name: last9-k8s-infra-env
          key: LAST9_OTLP_ENDPOINT
    - name: LAST9_CLUSTER_NAME
      valueFrom:
        configMapKeyRef:
          name: last9-k8s-infra-env
          key: LAST9_CLUSTER_NAME
    - name: LAST9_ENVIRONMENT
      valueFrom:
        configMapKeyRef:
          name: last9-k8s-infra-env
          key: LAST9_ENVIRONMENT
  config:
    exporters:
      otlp_http/last9:
        endpoint: ${env:LAST9_OTLP_ENDPOINT}
        headers:
          authorization: ${env:LAST9_AUTH}
        compression: gzip
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 5000
        retry_on_failure:
          enabled: true
    processors:
      k8s_attributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
          labels:
            - tag_name: $$1
              key_regex: (.*)
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      resource/last9:
        attributes:
          - key: k8s.cluster.name
            value: ${env:LAST9_CLUSTER_NAME}
            action: upsert
          - key: deployment.environment
            value: ${env:LAST9_ENVIRONMENT}
            action: upsert
      batch:
        send_batch_size: 8192
        timeout: 10s
    # Disable deprecated kubeletstats resource attributes to silence warnings.
    receivers:
      kubeletstats:
        resource_attributes:
          aws.volume.id:
            enabled: false
          fs.type:
            enabled: false
    service:
      pipelines:
        logs:
          exporters: [otlp_http/last9]
          processors: [k8s_attributes, resource/last9, batch]
        metrics:
          exporters: [otlp_http/last9]
          processors: [k8s_attributes, resource/last9, batch]
        traces:
          exporters: [otlp_http/last9]
          processors: [k8s_attributes, resource/last9, batch]
  # Grant RBAC for manually-configured k8s_attributes processor
  # (normally the kubernetesAttributes preset handles this).
  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["pods", "namespaces", "nodes"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["apps"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["extensions"]
        resources: ["replicasets"]
        verbs: ["get", "list", "watch"]

# ─── Cluster collector: rendered by this chart directly (own templates). ───
# Single-replica Deployment. Cluster metrics (k8s_cluster receiver) + Kubernetes events (k8sobjects).
clusterCollector:
  enabled: true
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.150.1"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  # Events collection (k8sobjects receiver)
  events:
    enabled: true
  # Cluster-level metrics (k8s_cluster receiver)
  metrics:
    enabled: true
    collectionInterval: 30s

# ─── OpenTelemetry Operator (optional) ───
# Enables Instrumentation CR for auto-instrumentation of Java, Python, Node.js, .NET, Go applications.
# Disabled by default. Requires cert-manager OR admissionWebhooks.certManager.enabled=false with auto-generated certs.
opentelemetry-operator:
  enabled: false
  manager:
    collectorImage:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.150.1"
  admissionWebhooks:
    certManager:
      enabled: false
    autoGenerateCert:
      enabled: true

# Instrumentation CR — rendered when opentelemetry-operator.enabled=true.
# Applications opt in via pod annotation: instrumentation.opentelemetry.io/inject-java: "last9/last9"
instrumentation:
  enabled: true
  name: last9
  # Sampler for traces
  sampler:
    type: parentbased_traceidratio
    argument: "1.0"
  # Java/Python/Node/.NET/Go image overrides — leave empty to use operator defaults.
  java:
    image: ""
  python:
    image: ""
  nodejs:
    image: ""
  dotnet:
    image: ""
  go:
    image: ""

# ─── kube-prometheus-stack (optional) ───
# Bundles Prometheus Operator, kube-state-metrics, node-exporter, alertmanager, grafana.
# Disabled by default. Enable if cluster has no existing Prometheus Operator.
# If existing Prometheus Operator present, leave disabled — agent's prometheus receiver scrapes cluster targets.
kube-prometheus-stack:
  enabled: false
  # Minimize surface — disable what Last9 ingests anyway.
  prometheus:
    prometheusSpec:
      remoteWrite:
        - url: ""  # Set via --set kube-prometheus-stack.prometheus.prometheusSpec.remoteWrite[0].url=https://...
  grafana:
    enabled: false
  alertmanager:
    enabled: false
  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true
  prometheusOperator:
    enabled: true
